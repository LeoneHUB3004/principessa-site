<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Quiz 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pink-bg page-transition">
  <canvas id="magic"></canvas>

  <button id="musicButton" class="music-btn" onclick="toggleMusic()">🎵</button>

  <main class="container card">
    <h1>🐴 Qual è la data di nascita del prode destriero del tuo cavaliere?</h1>

    <input id="answer" type="text" placeholder="scrivi qui la risposta">
    <button class="magic-btn" onclick="checkAnswer()">Invia</button>

    <p id="feedback"></p>
  </main>


  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>


  <script>
    function normalize(value) {
      return value.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function checkAnswer() {
      const value = normalize(document.getElementById("answer").value);
      const feedback = document.getElementById("feedback");

      const validAnswers = [
        "10 luglio 2025",
        "10/07/2025",
        "10 luglio",
        "10/07"
      ];

      if (validAnswers.includes(value)) {
        goToPage("finale.html");
      } else {
        feedback.className = "error";
        feedback.innerText = "Sbagliato 💔";
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
