<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Quiz 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pink-bg">
  <canvas id="magic"></canvas>

  <div class="container card">
    <h1>🐴 Qual è la data di nascita del prode destriero del tuo cavaliere?</h1>

    <input id="answer" type="text" placeholder="scrivi qui la risposta">
    <button class="magic-btn" onclick="checkAnswer()">Invia</button>

    <p id="feedback"></p>
  </div>

  <script>
    function normalize(value) {
      return value.trim().toLowerCase().replace(/\s+/g, " ");
    }

    function checkAnswer() {
      const value = normalize(document.getElementById("answer").value);
      const feedback = document.getElementById("feedback");

      const validAnswers = [
        "10 luglio 2025",
        "10/07/2025",
        "10 luglio",
        "10/07"
      ];

      if (validAnswers.includes(value)) {
        feedback.className = "success";
        feedback.innerText = "esatto! meno una, sei sempre piu vicina!";
        setTimeout(() => {
          window.location.href = "finale.html";
        }, 1500);
      } else {
        feedback.className = "error";
        feedback.innerText = "Sbagliato 💔";
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
