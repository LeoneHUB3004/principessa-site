<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Quiz 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pink-bg">
  <canvas id="magic"></canvas>

  <div class="container card">
    <h1>🍦 qual è il gusto di gelato preferito dal cavaliere?</h1>

    <input id="answer" type="text" placeholder="scrivi qui la risposta">
    <button class="magic-btn" onclick="checkAnswer()">Invia</button>

    <p id="feedback"></p>
  </div>

  <script>
    function checkAnswer() {
      const value = document.getElementById("answer").value.trim().toLowerCase();
      const feedback = document.getElementById("feedback");

      if (value === "caramello" || value === "caramello salato") {
        feedback.className = "success";
        feedback.innerText = "esatto! meno una, sei sempre piu vicina!";
        setTimeout(() => {
          window.location.href = "quiz2.html";
        }, 1500);
      } else {
        feedback.className = "error";
        feedback.innerText = "Sbagliato 💔";
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
