<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Domanda 1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pink-bg">
  <canvas id="magic"></canvas>

  <main class="card">
    <p class="quiz-step">Domanda 1 di 3</p>
    <h1>🍦 qual è il gusto di gelato preferito dal cavaliere?</h1>

    <input id="answer" type="text" placeholder="Scrivi la risposta..." autocomplete="off">
    <button class="magic-btn" onclick="checkAnswer()">Rispondi ✨</button>
    <p id="error" class="error"></p>
  </main>

  <script src="script.js"></script>
  <script>
    setupEnterKey("answer", checkAnswer);
    function checkAnswer() {
      const answer = normalizeAnswer(document.getElementById("answer").value);
      if (answer === "caramello" || answer === "caramello salato") {
        window.location.href = "quiz2.html";
      } else {
        document.getElementById("error").innerText = "Non è questa... riprova 💔";
      }
    }
  </script>
</body>
</html>
