<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Ingresso segreto</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pink-bg">
  <canvas id="magic"></canvas>

  <div class="container card">
    <h1>🔒 Inserisci la password segreta</h1>

    <input id="password" type="text" inputmode="numeric" maxlength="10" placeholder="gg/mm/aaaa" autocomplete="off">
    <button class="magic-btn" onclick="checkPassword()">Entra ✨</button>

    <p id="error"></p>
  </div>

  <script>
    const input = document.getElementById("password");

    input.addEventListener("input", function () {
      let digits = input.value.replace(/\D/g, "").slice(0, 8);
      let formatted = "";

      if (digits.length <= 2) {
        formatted = digits;
      } else if (digits.length <= 4) {
        formatted = digits.slice(0, 2) + "/" + digits.slice(2);
      } else {
        formatted = digits.slice(0, 2) + "/" + digits.slice(2, 4) + "/" + digits.slice(4);
      }

      input.value = formatted;
    });

    function checkPassword() {
      const value = document.getElementById("password").value;
      if (value === "14/03/2026") {
        window.location.href = "page1.html";
      } else {
        document.getElementById("error").innerText = "Password errata 💔";
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
