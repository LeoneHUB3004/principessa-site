<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="pink-bg page-transition">
  <canvas id="magic"></canvas>

  <div class="container card">
    <h1>🎁 la sera del vostro primo incontro, hai fatto un piccolo dono al tuo cavaliere, che lui conserva ancora gelosamente, cosa era?</h1>

    <input id="answer" type="text" placeholder="scrivi qui la risposta">
    <button class="magic-btn" onclick="checkAnswer()">Invia</button>

    <p id="feedback"></p>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    function checkAnswer() {
      const value = document.getElementById("answer").value.trim().toLowerCase();
      const feedback = document.getElementById("feedback");

      if (value === "scontrino" || value === "uno scontrino" || value === "lo scontrino") {
        goToPage("quiz3.html");
      } else {
        feedback.className = "error";
        feedback.innerText = "Sbagliato 💔";
      }
    }
  </script>
  <script src="script.js"></script>
</body>
</html>
